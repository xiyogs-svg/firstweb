<!DOCTYPE html>
<html lang="zh">
<head>

<title>KIRO COLLECTION</title>
<link rel="stylesheet" href="mos-orb.css">
<link rel="stylesheet" href="fixed-back.css">

<!-- 字体（接近KHAITE） -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Helvetica, Arial, sans-serif;
  color: #111;
  background: #fff;
}

.site-header {
  position: fixed;   /* 和首页一致 */
  top: 0;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 24px 40px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  z-index: 999;
}

/* 左右 */
.nav-left,
.nav-right {
  display: flex;
  gap: 28px;
}

.nav-right {
  justify-content: flex-end;
}

/* logo */
.site-header .logo {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 38px;
  line-height: 1;
  letter-spacing: 1.2px;
  text-decoration: none;
  color: #111;
  font-weight: 700;
}

/* link */
.site-header a {
  font-size: 14px;
  text-decoration: none;
  color: #111;
  transition: 0.2s;
}

.site-header a:hover {
  opacity: 0.5;
}

/* ===== 首屏 ===== */
.hero {
  padding-top: 120px;
  text-align: center;
  position: relative;
}

/* 返回 */
/* 标题 */
.title {
  font-family: "Playfair Display", serif;
  font-size: 40px;
  letter-spacing: 2px;
  margin-bottom: 60px;
}

/* 横图 */
.hero-img {
  width: 100%;
  max-width: 2100px;
  margin: 0 auto;
}

.hero-img img {
  width: 100%;
  aspect-ratio: 2 / 1;
  object-fit: cover;
}

/* ===== 商品网格 ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  margin-top: 80px;
}

/* 商品卡 */
.card {
  padding: 40px 20px 20px;
  text-decoration: none;
  color: #111;
}

/* 图片 */
.img-wrap {
  position: relative;
  height: 320px;
}

.img-wrap img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: 0.4s;
}

.img-hover {
  opacity: 0;
}

.card:hover .img-hover {
  opacity: 1;
}

.card:hover .img-main {
  opacity: 0;
}

/* 信息 */
.info {
  display: flex;
  justify-content: space-between;
  margin-top: 16px;
  font-size: 13px;
  letter-spacing: 0.5px;
}

.price {
  color: #666;
}

@media (max-width: 760px) {
  .site-header .logo {
    font-size: 30px;
    letter-spacing: 1px;
  }
}
</style>
</head>
