<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Product Detail</title>
<link rel="stylesheet" href="mos-orb.css">
<link rel="stylesheet" href="fixed-back.css">

<style>
body {
  margin: 0;
  font-family: Helvetica, Arial, sans-serif;
  color: #111;
  opacity: 0;
  animation: pageFadeIn 0.6s ease forwards;
}

@keyframes pageFadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

body.page-leave {
  opacity: 0;
  transform: translateY(8px);
  transition: 0.35s ease;
}

/* 顶部导航 */
.site-header {
  position: relative;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 24px 40px;
  border-bottom: 1px solid #eee;
}

.nav-left, .nav-right {
  display: flex;
  gap: 28px;
}

.nav-right {
  justify-content: flex-end;
}

.site-header a {
  text-decoration: none;
  color: #111;
  font-family: Georgia, "Times New Roman", serif;
  font-size: 13px;
  letter-spacing: 0.15px;
}

.site-header .logo {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 34px;
  line-height: 1;
  letter-spacing: 1px;
  font-weight: 700;
  color: rgba(0,0,0,0.82);
}

/* 主体 */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  padding: 60px;
}

/* 图片区 */
.gallery {
  display: grid;
  grid-template-columns: 100px 1fr;
  gap: 20px;
}

.thumbs img {
  width: 100%;
  margin-bottom: 10px;
  cursor: pointer;
  opacity: 0.6;
  transition: 0.2s ease;
}

.thumbs img:hover {
  opacity: 1;
}

.main img {
  width: 100%;
  height: 500px;
  object-fit: cover;
  cursor: zoom-in;
}

/* 信息 */
.info h1 {
  font-size: 28px;
  margin-top: 0;
}

.price {
  margin: 20px 0;
}

.btn {
  border: 1px solid black;
  padding: 14px;
  cursor: pointer;
  margin-bottom: 30px;
  transition: 0.25s ease;
  text-align: center;
}

.btn:hover {
  background: black;
  color: white;
}

/* 折叠 */
.item {
  border-top: 1px solid #eee;
  padding: 15px 0;
  cursor: pointer;
}

.content {
  max-height: 0;
  overflow: hidden;
  transition: 0.35s ease;
  font-size: 13px;
  color: #666;
  line-height: 1.7;
}

/* 品牌区 */
.brand {
  text-align: center;
  padding: 60px;
  border-top: 1px solid #eee;
}

@media (max-width: 760px) {
  .site-header .logo {
    font-size: 30px;
    letter-spacing: 1px;
  }
}
</style>
</head>

<body>

<header class="site-header">
  <div class="nav-left">
    <a href="#">Featured</a>
    <a href="#">Shop</a>
    <a href="#">Leather Goods</a>
    <a href="#">Collections</a>
  </div>

  <div class="nav-center">
    <a href="index.html" class="logo page-link">MOS</a>
  </div>

  <div class="nav-right">
    <a href="#">Search</a>
    <a href="login.html">Account</a>
    <a href="cart.html" class="page-link">Cart</a>
  </div>
</header>

<div class="container">
  <div class="gallery">
    <div class="thumbs">
      <img src="images/pic1.jpg" onclick="changeImg(this,0)">
      <img src="images/pic1.1.jpg" onclick="changeImg(this,1)">
      <img src="images/pic1.2.jpg" onclick="changeImg(this,2)">
    </div>

    <div class="main">
      <img id="mainImg" src="images/pic1.jpg" onclick="openViewer()">
    </div>
  </div>

  <div class="info">
    <h1>Vintage Necklace</h1>
    <div class="price">$299</div>

    <p>
      A refined expression of modern craftsmanship. Designed with structure and balance.
    </p>

    <div class="btn" onclick="addToCart()">Add to Cart</div>

    <div class="item" onclick="toggle(this)">
      Product Details
      <div class="content">
        Premium material<br>
        Handcrafted finish
      </div>
    </div>

    <div class="item" onclick="toggle(this)">
      Dimensions
      <div class="content">
        30cm x 20cm
      </div>
    </div>
  </div>
</div>

<div class="brand">
  <h2>MOS</h2>
  <p>Craftsmanship meets identity.</p>
</div>

<script>
let images = [
  "images/pic1.jpg",
  "images/pic1.1.jpg",
  "images/pic1.2.jpg"
];

let currentIndex = 0;

function changeImg(el, index) {
  document.getElementById("mainImg").src = el.src;
  currentIndex = index;
}

function toggle(el) {
  let c = el.querySelector(".content");
  c.style.maxHeight = c.style.maxHeight ? null : c.scrollHeight + "px";
}

/* 多商品购物车 */
function addToCart() {
  const product = {
    id: "vintage-necklace",
    name: "Vintage Necklace",
    price: 299,
    image: "images/pic1.jpg",
    qty: 1
  };

  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  const existing = cart.find(item => item.id === product.id);

  if (existing) {
    existing.qty += 1;
  } else {
    cart.push(product);
  }

  localStorage.setItem("cart", JSON.stringify(cart));
  goToPage("cart.html");
}

/* 页面切换 */
function goToPage(url) {
  if (window.showMosLoading) showMosLoading();
  document.body.classList.add("page-leave");
  setTimeout(() => {
    window.location.href = url;
  }, 300);
}

document.querySelectorAll(".page-link").forEach(link => {
  link.addEventListener("click", function(e) {
    e.preventDefault();
    goToPage(this.getAttribute("href"));
  });
});

/* 大图轮播 */
function openViewer() {
  let overlay = document.createElement("div");
  overlay.id = "viewer";
  overlay.style.position = "fixed";
  overlay.style.top = 0;
  overlay.style.left = 0;
  overlay.style.width = "100%";
  overlay.style.height = "100%";
  overlay.style.background = "rgba(0,0,0,0.9)";
  overlay.style.display = "flex";
  overlay.style.alignItems = "center";
  overlay.style.justifyContent = "center";
  overlay.style.zIndex = "9999";

  let img = document.createElement("img");
  img.src = images[currentIndex];
  img.style.maxWidth = "80%";

  let prev = document.createElement("div");
  prev.innerHTML = "‹";
  prev.style.position = "absolute";
  prev.style.left = "40px";
  prev.style.color = "white";
  prev.style.fontSize = "40px";
  prev.style.cursor = "pointer";

  let next = document.createElement("div");
  next.innerHTML = "›";
  next.style.position = "absolute";
  next.style.right = "40px";
  next.style.color = "white";
  next.style.fontSize = "40px";
  next.style.cursor = "pointer";

  prev.onclick = (e) => {
    e.stopPropagation();
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    img.src = images[currentIndex];
  };

  next.onclick = (e) => {
    e.stopPropagation();
    currentIndex = (currentIndex + 1) % images.length;
    img.src = images[currentIndex];
  };

  document.onkeydown = function(e) {
    if (e.key === "ArrowRight") {
      currentIndex = (currentIndex + 1) % images.length;
      img.src = images[currentIndex];
    }
    if (e.key === "ArrowLeft") {
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      img.src = images[currentIndex];
    }
    if (e.key === "Escape") {
      overlay.remove();
      document.onkeydown = null;
    }
  };

  overlay.onclick = () => {
    overlay.remove();
    document.onkeydown = null;
  };

  overlay.appendChild(img);
  overlay.appendChild(prev);
  overlay.appendChild(next);
  document.body.appendChild(overlay);
}
</script>
<script src="fixed-back.js"></script>
<script src="mos-orb.js"></script>

</body>
</html>
