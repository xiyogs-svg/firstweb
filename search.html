<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Search</title>
<link rel="stylesheet" href="fixed-back.css">

<style>
body {
  margin: 0;
  font-family: Helvetica, Arial;
  padding: 100px 40px;
}

/* 标题 */
h1 {
  font-size: 24px;
  margin-bottom: 40px;
}

/* 网格 */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 30px;
}

/* 卡片 */
.card {
  display: block;
  color: #111;
  text-decoration: none;
}

.card img {
  width: 100%;
  height: 320px;
  object-fit: cover;
  display: block;
  transition: opacity 0.2s ease;
}

.card:hover img {
  opacity: 0.82;
}

.card p {
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<h1 id="resultTitle"></h1>

<div class="grid" id="results"></div>

<script>
/* 商品数据（你可以自己扩展） */
const products = [
  { name: "TEVIS TOP", img: "images/kiro1.jpg", url: "kiro1.html" },
  { name: "KILIAN SKIRT", img: "images/kiro2.3.png", url: "kiro2.html" },
  { name: "BLAKE CLUTCH", img: "images/case21.png", url: "kiro3.html" },
  { name: "MILLY PUMP", img: "images/kiro5.11.png", url: "kiro4.html" }
];

/* 获取关键词 */
const params = new URLSearchParams(window.location.search);
const query = params.get("q");

/* 标题 */
document.getElementById("resultTitle").innerText = 
  `Search results for "${query}"`;

/* 筛选 */
const filtered = products.filter(p =>
  p.name.toLowerCase().includes(query.toLowerCase())
);

/* 渲染 */
const container = document.getElementById("results");

if (filtered.length === 0) {
  container.innerHTML = "<p>No results found.</p>";
} else {
  filtered.forEach(p => {
    container.innerHTML += `
      <a class="card" href="${p.url}">
        <img src="${p.img}">
        <p>${p.name}</p>
      </a>
    `;
  });
}
</script>
<script src="fixed-back.js"></script>

</body>
</html>
