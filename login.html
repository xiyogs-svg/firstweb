<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Login | MOS</title>
<link rel="icon" href="images/logo.png">
<link rel="stylesheet" href="mos-orb.css">
<link rel="stylesheet" href="fixed-back.css">
<link rel="stylesheet" href="account.css">
</head>
<body>
<header class="site-header">
  <nav class="nav-left">
    <a href="index.html">Featured</a>
    <a href="kiro.html">Shop</a>
    <a href="aiden.html">Leather Goods</a>
    <a href="kiro.html">Collections</a>
  </nav>
  <a href="index.html" class="logo">MOS</a>
  <nav class="nav-right">
    <a href="search.html">Search</a>
    <a href="#">Stores</a>
    <a href="login.html">Account</a>
    <a href="cart.html">Cart</a>
  </nav>
</header>

<main class="auth-page">
  <section class="auth-panel">
    <p class="auth-kicker">Account</p>
    <h1>Sign in to MOS</h1>
    <p class="auth-copy">Use your email address or mobile number to access your account, orders, and saved details.</p>

    <div class="auth-tabs" role="tablist" aria-label="Login methods">
      <button class="auth-tab active" type="button" data-mode="email">Email</button>
      <button class="auth-tab" type="button" data-mode="phone">Mobile</button>
    </div>

    <form class="auth-form active" data-mode="email" data-action="login">
      <div class="auth-field">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" name="email" type="email" autocomplete="email" required>
      </div>
      <div class="auth-field">
        <label for="loginEmailPassword">Password</label>
        <input id="loginEmailPassword" name="password" type="password" autocomplete="current-password" required>
      </div>
      <div class="auth-actions">
        <a class="auth-link" href="forgot-password.html">Forgot password?</a>
        <a class="auth-link" href="register.html">Create an account</a>
      </div>
      <button class="auth-button" type="submit">Sign In</button>
    </form>

    <form class="auth-form" data-mode="phone" data-action="login">
      <div class="auth-field">
        <label for="loginPhone">Mobile number</label>
        <input id="loginPhone" name="phone" type="tel" autocomplete="tel" required>
      </div>
      <div class="auth-field">
        <label for="loginPhonePassword">Password</label>
        <input id="loginPhonePassword" name="password" type="password" autocomplete="current-password" required>
      </div>
      <div class="auth-actions">
        <a class="auth-link" href="forgot-password.html">Forgot password?</a>
        <a class="auth-link" href="register.html">Create an account</a>
      </div>
      <button class="auth-button" type="submit">Sign In</button>
    </form>

    <p class="auth-note" id="authNote"></p>
  </section>

  <aside class="auth-side" aria-label="MOS identity">
    <div class="auth-brand">
      <h2>MOS</h2>
      <div class="mos-orb"></div>
      <p>Mass · Order · Surge</p>
    </div>
  </aside>
</main>

<script src="account.js"></script>
<script src="fixed-back.js"></script>
<script src="mos-orb.js"></script>
</body>
</html>
